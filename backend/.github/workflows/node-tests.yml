name: Node.js CI

# Se ejecuta al pushear o hacer PR a main
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest # Ambiente virtual limpio

    steps:
      - uses: actions/checkout@v4 # Baja el código del repo

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test # Ejecuta el script de tu package.json
